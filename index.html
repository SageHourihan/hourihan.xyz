<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hourihan.xyz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100&family=IBM+Plex+Mono:wght@300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    /* ── Homepage-specific ─────────────────────────────────── */
    .home {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 120px 40px 80px;
      text-align: center;
    }

    .site-title {
      font-family: "Josefin Sans", sans-serif;
      font-weight: 100;
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
      margin-bottom: 48px;
      transition: color 0.4s;
    }

    .manifesto {
      display: flex;
      flex-direction: column;
      gap: 32px;
      max-width: 560px;
    }

    .manifesto-block h3 {
      font-family: "IBM Plex Mono", monospace;
      font-weight: 300;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      transition: color 0.4s;
    }

    .manifesto-block p {
      font-family: "IBM Plex Mono", monospace;
      font-weight: 300;
      font-size: 0.85rem;
      line-height: 1.8;
      color: var(--ink);
      transition: color 0.4s;
    }

    .manifesto-block em {
      font-style: italic;
      font-weight: 300;
    }

    .manifesto-block a {
      color: var(--ink);
      text-decoration: underline;
      text-decoration-style: dashed;
      text-underline-offset: 3px;
    }

    .manifesto-block a::after {
      content: " ↗";
      font-size: 0.7em;
      color: var(--muted);
    }

    .manifesto-block a:hover {
      color: var(--muted);
    }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <div class="home">
    <h1 class="site-title">Hourihan.xyz</h1>

    <div class="manifesto">
      <div class="manifesto-block">
        <h3>what is this?</h3>
        <p>a brain dump with a domain name. i miss <a href="https://www.dictionary.com/browse/surfing-the-web" target="_blank" rel="noopener noreferrer">surfing the web</a> and really hate <a href="https://www.dictionary.com/browse/doomscrolling" target="_blank" rel="noopener noreferrer">doom scrolling.</a></p>
      </div>
      <div class="manifesto-block">
        <h3>the one guiding principle</h3>
        <p><em>i build for myself and no one else.</em> the moment i worry about optimizing this site for others i have lost sight of what this project is about.</p>
      </div>
    </div>
  </div>

  <button class="toggle" id="themeToggle" aria-label="Toggle colour mode"></button>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
